<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QQQ Streaming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810; --surface: #0f0f1a; --card: #13131f; --border: #1e1e30;
      --accent: #e63946; --accent2: #ff6b6b; --text: #f0f0f5; --muted: #6b6b8a; --gold: #ffd166;
    }

    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.4;
    }

    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8, 8, 16, 0.85); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border); padding: 0 24px;
      height: 60px; display: flex; align-items: center; justify-content: space-between;
    }

    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--text); }
    .logo span { color: var(--accent); }

    .header-meta { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 16px; }

    .live-dot { width: 7px; height: 7px; background: #2ecc71; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    .hero { position: relative; z-index: 1; padding: 48px 24px 24px; max-width: 1400px; margin: 0 auto; }

    .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px, 8vw, 96px); line-height: 0.9; letter-spacing: 1px; margin-bottom: 16px; }
    .hero-title span { color: var(--accent); display: block; }

    .search-wrap { position: relative; max-width: 480px; margin-bottom: 32px; }

    .search-wrap input {
      width: 100%; background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px 12px 44px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }

    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }

    .stats-bar { display: flex; gap: 24px; margin-bottom: 32px; flex-wrap: wrap; }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent); line-height: 1; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .divider { width: 1px; background: var(--border); align-self: stretch; }

    .section-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
      color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; position: relative; z-index: 1; }

    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      cursor: pointer; text-decoration: none; color: inherit; display: block; animation: fadeUp 0.4s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 8px 32px rgba(230, 57, 70, 0.2); }

    .card-poster { aspect-ratio: 2/3; background: var(--surface); position: relative; overflow: hidden; }
    .card-poster img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
    .card:hover .card-poster img { transform: scale(1.05); }

    .card-poster .no-poster {
      width: 100%; height: 100%; display: flex; align-items: center;
      justify-content: center; font-size: 40px;
      background: linear-gradient(135deg, #13131f, #1a1a2e);
    }

    .badge { position: absolute; top: 8px; right: 8px; background: var(--accent); color: #fff; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.5px; }
    .badge.hd { background: #2ecc71; color: #000; }

    .rating-badge {
      position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px); color: var(--gold); font-size: 11px; font-weight: 500;
      padding: 3px 8px; border-radius: 4px; display: flex; align-items: center; gap: 4px;
    }

    .card-body { padding: 12px; }
    .card-title { font-size: 13px; font-weight: 500; line-height: 1.3; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }

    .play-overlay { position: absolute; inset: 0; background: rgba(230, 57, 70, 0.85); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; font-size: 32px; }
    .card:hover .play-overlay { opacity: 1; }

    .empty-state { grid-column: 1 / -1; text-align: center; padding: 80px 0; color: var(--muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    .loading { grid-column: 1 / -1; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 80px 0; color: var(--muted); font-size: 14px; }

    .load-more { grid-column: 1 / -1; display: flex; align-items: center; justify-content: center; padding: 32px 0; }

    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { position: relative; z-index: 1; text-align: center; padding: 32px 24px; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); margin-top: 48px; }

    #refresh-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    #refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
      .hero { padding: 32px 16px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">FILM<span>STREAM</span></div>
  <div class="header-meta">
    <span><span class="live-dot"></span> Live</span>
    <span id="header-count">— film</span>
    <button id="refresh-btn" onclick="loadMovies(true)">↻ Refresh</button>
  </div>
</header>

<div class="hero" id="main">
  <h1 class="hero-title">Film<span>Terbaru.</span></h1>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Cari judul film..." oninput="filterMovies()">
  </div>

  <div class="stats-bar" id="stats-bar">
    <div class="stat"><div class="stat-val" id="stat-total">—</div><div class="stat-label">Total Film</div></div>
    <div class="divider"></div>
    <div class="stat"><div class="stat-val" id="stat-updated">—</div><div class="stat-label">Terakhir Update</div></div>
  </div>

  <div class="section-label">Semua Film</div>

  <div class="grid" id="movie-grid">
    <div class="loading"><div class="spinner"></div> Memuat film...</div>
  </div>
</div>

<footer>
  Auto-refresh setiap 30 menit &nbsp;·&nbsp; Data dari LK21
</footer>

<script>
  const API = "/api/movies";
  const LIMIT = 50;
  let allMovies = [], filtered = [], page = 1, loading = false, currentSearch = "";

  async function checkAuth() {
    const res = await fetch(API + "?t=" + Date.now());
    if (res.status === 401) {
      document.getElementById('movie-grid').innerHTML = `
        <div class="empty-state">
          <div class="icon">🔒</div>
          <p>Login dengan Discord untuk menonton film</p>
          <a href="/api/auth/login" style="display:inline-block;margin-top:16px;padding:10px 24px;background:#5865F2;color:#fff;border-radius:8px;text-decoration:none;font-weight:500;">
            Login dengan Discord
          </a>
        </div>`;
      return false;
    }
    return true;
  }

  async function loadMovies(reset = false) {
    if (loading) return;
    loading = true;
    if (reset) {
      page = 1; allMovies = []; filtered = []; currentSearch = "";
      document.getElementById('search').value = "";
      document.getElementById('movie-grid').innerHTML =
        '<div class="loading"><div class="spinner"></div> Memuat film...</div>';
    }
    try {
      const res = await fetch(API + "?t=" + Date.now());
      if (res.status === 401) {
        await checkAuth();
        loading = false;
        return;
      }
      if (!res.ok) throw new Error("Gagal fetch");
      const data = await res.json();
      allMovies = data.movies || [];
      filtered = allMovies;
      document.getElementById('stat-total').textContent = data.total || allMovies.length;
      document.getElementById('header-count').textContent = (data.total || allMovies.length) + " film";
      if (data.last_updated) {
        const d = new Date(data.last_updated);
        document.getElementById('stat-updated').textContent =
          d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
      }
      renderPage(true);
    } catch (err) {
      document.getElementById('movie-grid').innerHTML =
        '<div class="empty-state"><div class="icon">⚠️</div><p>Gagal memuat data.</p></div>';
    }
    loading = false;
  }

  function renderPage(reset = false) {
    const grid = document.getElementById('movie-grid');
    const oldLoader = grid.querySelector('.load-more');
    if (oldLoader) oldLoader.remove();
    if (reset) grid.innerHTML = "";
    if (!filtered.length && reset) {
      grid.innerHTML = '<div class="empty-state"><div class="icon">🎬</div><p>Tidak ada film ditemukan.</p></div>';
      return;
    }
    const start = (page - 1) * LIMIT;
    const slice = filtered.slice(start, start + LIMIT);
    slice.forEach((m, i) => {
      const a = document.createElement("a");
      a.className = "card";
      a.href = m.player_url;
      a.target = "_blank";
      a.rel = "noopener";
      a.style.animationDelay = Math.min(i * 30, 600) + "ms";
      a.innerHTML = `
        <div class="card-poster">
          ${m.poster
            ? `<img src="${m.poster}" alt="${m.title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=no-poster>🎬</div>'">`
            : '<div class="no-poster">🎬</div>'}
          ${m.quality ? `<div class="badge ${m.quality === 'HD' ? 'hd' : ''}">${m.quality}</div>` : ''}
          ${m.rating ? `<div class="rating-badge">★ ${m.rating}</div>` : ''}
          <div class="play-overlay">▶</div>
        </div>
        <div class="card-body">
          <div class="card-title">${m.title}</div>
          <div class="card-meta">
            ${m.year ? `<span>${m.year}</span>` : ""}
            ${m.year && m.duration ? "<span>·</span>" : ""}
            ${m.duration ? `<span>${m.duration}</span>` : ""}
          </div>
        </div>`;
      grid.appendChild(a);
    });
    const hasMore = start + LIMIT < filtered.length;
    if (hasMore) {
      const loader = document.createElement("div");
      loader.className = "load-more";
      loader.innerHTML = '<div class="spinner"></div>';
      grid.appendChild(loader);
    }
    page++;
  }

  let searchTimer;
  function filterMovies() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      currentSearch = document.getElementById('search').value.toLowerCase().trim();
      filtered = currentSearch
        ? allMovies.filter(m => m.title.toLowerCase().includes(currentSearch))
        : allMovies;
      page = 1;
      renderPage(true);
    }, 300);
  }

  window.addEventListener("scroll", () => {
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 400) {
      if (!loading && page * LIMIT <= filtered.length + LIMIT) renderPage();
    }
  });

  loadMovies();
  setInterval(() => loadMovies(true), 30 * 60 * 1000);
</script>
</body>
</html>
