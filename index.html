<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QQQ Streaming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810;
      --surface: #0f0f1a;
      --card: #13131f;
      --card-hover: #17172a;
      --border: #1e1e30;
      --border-hover: #2e2e48;
      --accent: #e63946;
      --accent2: #ff6b6b;
      --accent-dim: rgba(230, 57, 70, 0.15);
      --text: #f0f0f5;
      --text-dim: #c0c0d0;
      --muted: #6b6b8a;
      --muted-light: #8b8baa;
      --gold: #ffd166;
      --green: #2ecc71;
      --discord: #5865F2;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* Ambient glow top */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(230, 57, 70, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── HEADER ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8, 8, 16, 0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 3px;
      color: var(--text);
      user-select: none;
    }
    .logo span { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted-light);
      background: rgba(46, 204, 113, 0.08);
      border: 1px solid rgba(46, 204, 113, 0.2);
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(46,204,113,0.4); }
      50% { opacity: 0.7; transform: scale(1.2); box-shadow: 0 0 0 4px rgba(46,204,113,0); }
    }

    #header-count {
      font-size: 11px;
      color: var(--muted);
    }

    .header-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .header-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    #logout-btn {
      display: none; /* hidden by default, shown after auth check */
      border-color: rgba(230, 57, 70, 0.3);
      color: var(--accent2);
    }
    #logout-btn:hover {
      border-color: var(--accent);
      color: #fff;
      background: var(--accent);
    }

    /* ─── HERO ─── */
    .hero {
      position: relative;
      z-index: 1;
      padding: 56px 28px 28px;
      max-width: 1440px;
      margin: 0 auto;
    }

    .hero-eyebrow {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--accent);
      margin-bottom: 12px;
      opacity: 0.8;
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 9vw, 104px);
      line-height: 0.88;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }
    .hero-title span {
      color: var(--accent);
      display: block;
    }

    /* ─── SEARCH ─── */
    .search-wrap {
      position: relative;
      max-width: 500px;
      margin-bottom: 36px;
    }

    .search-wrap input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px 13px 46px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .search-wrap input:focus {
      border-color: var(--accent);
      background: #16162a;
      box-shadow: 0 0 0 3px rgba(230,57,70,0.1);
    }
    .search-wrap input::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 15px;
      pointer-events: none;
      transition: color 0.2s;
    }
    .search-wrap input:focus ~ .search-icon,
    .search-wrap:focus-within .search-icon { color: var(--accent); }

    .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--border);
      border: none;
      color: var(--muted);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 11px;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .search-clear:hover { background: var(--accent); color: #fff; }
    .search-clear.visible { display: flex; }

    /* ─── STATS BAR ─── */
    .stats-bar {
      display: flex;
      gap: 28px;
      margin-bottom: 36px;
      flex-wrap: wrap;
      align-items: center;
    }

    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      color: var(--accent);
      line-height: 1;
      letter-spacing: 1px;
    }
    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .stat-divider { width: 1px; height: 36px; background: var(--border); }

    /* ─── FILTER TABS ─── */
    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-tab {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--border);
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .filter-tab:hover { border-color: var(--border-hover); color: var(--text-dim); }
    .filter-tab.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--muted);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
    }

    /* ─── GRID ─── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 18px;
      position: relative;
      z-index: 1;
    }

    /* ─── CARD ─── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      animation: fadeUp 0.5s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: rgba(230, 57, 70, 0.5);
      box-shadow: 0 12px 40px rgba(230, 57, 70, 0.18), 0 4px 12px rgba(0,0,0,0.4);
      background: var(--card-hover);
    }

    .card-poster {
      aspect-ratio: 2/3;
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }

    .card-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
      display: block;
    }
    .card:hover .card-poster img { transform: scale(1.07); }

    .card-poster .no-poster {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      background: linear-gradient(135deg, #13131f 0%, #1a1a2e 50%, #13131f 100%);
      color: var(--muted);
    }

    /* Quality badge */
    .badge {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 9px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 5px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
    }
    .badge-default { background: rgba(230,57,70,0.85); color: #fff; }
    .badge-hd { background: rgba(46,204,113,0.85); color: #000; }
    .badge-cam { background: rgba(255,200,0,0.85); color: #000; }

    /* Rating badge */
    .rating-badge {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(6px);
      color: var(--gold);
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* NEW badge */
    .new-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
      animation: newPulse 2s ease infinite;
    }
    @keyframes newPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(230,57,70,0.5); }
      50% { box-shadow: 0 0 0 5px rgba(230,57,70,0); }
    }

    /* Gradient overlay + play button */
    .play-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(230,57,70,0.9) 0%, rgba(230,57,70,0.4) 50%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .card:hover .play-overlay { opacity: 1; }

    .play-icon {
      width: 52px;
      height: 52px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transform: scale(0.8);
      transition: transform 0.2s ease;
    }
    .card:hover .play-icon { transform: scale(1); }

    .card-body { padding: 12px 14px 14px; }
    .card-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.35;
      margin-bottom: 7px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: var(--text);
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .card-meta-dot { opacity: 0.4; }

    /* ─── STATES ─── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 100px 0;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 52px; margin-bottom: 16px; display: block; }
    .empty-state p { font-size: 14px; line-height: 1.6; }
    .empty-state strong { color: var(--text-dim); }

    .loading {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 100px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .load-more {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 0;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── AUTH SCREEN ─── */
    .auth-screen {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
      gap: 20px;
    }

    .auth-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, rgba(230,57,70,0.15), rgba(230,57,70,0.05));
      border: 1px solid rgba(230,57,70,0.2);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    .auth-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 1px;
      color: var(--text);
    }

    .auth-desc {
      font-size: 14px;
      color: var(--muted);
      max-width: 300px;
      line-height: 1.6;
    }

    .discord-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 28px;
      background: var(--discord);
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .discord-btn:hover {
      background: #4752c4;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(88,101,242,0.4);
    }
    .discord-icon { font-size: 18px; }

    /* ─── FOOTER ─── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 28px 24px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--border);
      margin-top: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    footer span { opacity: 0.4; }

    /* ─── TOAST NOTIFICATION ─── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 12px 18px;
      border-radius: 10px;
      z-index: 999;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      max-width: 280px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: rgba(46,204,113,0.4); }
    #toast.error { border-color: rgba(230,57,70,0.4); }

    /* ─── SCROLL TO TOP ─── */
    #scroll-top {
      position: fixed;
      bottom: 24px;
      left: 24px;
      width: 40px;
      height: 40px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--muted);
      font-size: 16px;
      z-index: 50;
      transition: all 0.2s;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
    }
    #scroll-top.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }
    #scroll-top:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      header { padding: 0 16px; height: 56px; }
      .live-badge { display: none; }
      #header-count { display: none; }
      .hero { padding: 36px 16px 16px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
      footer { padding: 20px 16px; }
    }

    @media (max-width: 400px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- ─── HEADER ─── -->
<header>
  <div class="logo">FILM<span>STREAM</span></div>
  <div class="header-right">
    <div class="live-badge">
      <span class="live-dot"></span>
      Live
    </div>
    <span id="header-count"></span>
    <button class="header-btn" id="refresh-btn" onclick="loadMovies(true)">
      ↻ Refresh
    </button>
    <a href="/api/auth/logout" class="header-btn" id="logout-btn">
      ⏻ Logout
    </a>
  </div>
</header>

<!-- ─── MAIN ─── -->
<div class="hero" id="main">
  <div class="hero-eyebrow">QQQ Streaming</div>
  <h1 class="hero-title">Film<span>Terbaru.</span></h1>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Cari judul film..." oninput="filterMovies()" autocomplete="off" spellcheck="false">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-val" id="stat-total">—</div>
      <div class="stat-label">Total Film</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-val" id="stat-showing">—</div>
      <div class="stat-label">Ditampilkan</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-val" id="stat-updated">—</div>
      <div class="stat-label">Terakhir Update</div>
    </div>
  </div>

  <div class="section-label" id="section-label">Semua Film</div>

  <div class="grid" id="movie-grid">
    <div class="loading"><div class="spinner"></div> Memuat film...</div>
  </div>
</div>

<!-- ─── FOOTER ─── -->
<footer>
  Auto-refresh setiap 30 menit
  <span>·</span>
  Data dari LK21
  <span>·</span>
  QQQ Streaming
</footer>

<!-- ─── TOAST ─── -->
<div id="toast"></div>

<!-- ─── SCROLL TOP ─── -->
<button id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Scroll ke atas">↑</button>

<script>
  const API    = "/api/movies";
  const LIMIT  = 50;

  let allMovies    = [];
  let filtered     = [];
  let page         = 1;
  let loading      = false;
  let currentSearch = "";
  let isLoggedIn   = false;

  // ─── TOAST ───
  let toastTimer;
  function showToast(msg, type = "info") {
    const t = document.getElementById("toast");
    const icons = { success: "✅", error: "❌", info: "ℹ️" };
    t.innerHTML = `<span>${icons[type] || "ℹ️"}</span> ${msg}`;
    t.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ""; }, 3000);
  }

  // ─── AUTH CHECK ───
  async function checkAuth() {
    try {
      const res = await fetch(API + "?t=" + Date.now());
      if (res.status === 401) {
        isLoggedIn = false;
        document.getElementById("logout-btn").style.display = "none";
        document.getElementById("movie-grid").innerHTML = `
          <div class="auth-screen">
            <div class="auth-icon">🔒</div>
            <div class="auth-title">Login Diperlukan</div>
            <p class="auth-desc">Login dengan akun Discord kamu untuk mulai menonton film.</p>
            <a href="/api/auth/login" class="discord-btn">
              <span class="discord-icon">🎮</span>
              Login dengan Discord
            </a>
          </div>`;
        return false;
      }
      isLoggedIn = true;
      document.getElementById("logout-btn").style.display = "inline-flex";
      return true;
    } catch {
      return false;
    }
  }

  // ─── LOAD MOVIES ───
  async function loadMovies(reset = false) {
    if (loading) return;
    loading = true;

    if (reset) {
      page = 1;
      allMovies = [];
      filtered  = [];
      currentSearch = "";
      document.getElementById("search").value = "";
      document.getElementById("search-clear").classList.remove("visible");
      document.getElementById("movie-grid").innerHTML =
        '<div class="loading"><div class="spinner"></div> Memuat film...</div>';
      updateSectionLabel();
    }

    try {
      const res = await fetch(API + "?t=" + Date.now());

      if (res.status === 401) {
        await checkAuth();
        loading = false;
        return;
      }

      if (!res.ok) throw new Error("Gagal fetch");

      const data = await res.json();

      // Show logout button
      document.getElementById("logout-btn").style.display = "inline-flex";
      isLoggedIn = true;

      allMovies = data.movies || [];
      filtered  = allMovies;

      const total = data.total || allMovies.length;
      document.getElementById("stat-total").textContent    = total;
      document.getElementById("stat-showing").textContent  = total;
      document.getElementById("header-count").textContent  = total + " film";

      if (data.last_updated) {
        const d = new Date(data.last_updated);
        document.getElementById("stat-updated").textContent =
          d.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" });
      }

      renderPage(true);

      if (reset) showToast("Data berhasil dimuat", "success");

    } catch (err) {
      document.getElementById("movie-grid").innerHTML = `
        <div class="empty-state">
          <span class="icon">⚠️</span>
          <p>Gagal memuat data.<br><strong>Coba refresh halaman.</strong></p>
        </div>`;
      showToast("Gagal memuat data", "error");
    }

    loading = false;
  }

  // ─── RENDER PAGE ───
  function renderPage(reset = false) {
    const grid = document.getElementById("movie-grid");

    // Remove existing load-more spinner
    const oldLoader = grid.querySelector(".load-more");
    if (oldLoader) oldLoader.remove();

    if (reset) grid.innerHTML = "";

    if (!filtered.length && reset) {
      grid.innerHTML = `
        <div class="empty-state">
          <span class="icon">🎬</span>
          <p>Tidak ada film ditemukan untuk<br><strong>"${currentSearch}"</strong></p>
        </div>`;
      document.getElementById("stat-showing").textContent = "0";
      return;
    }

    const start = (page - 1) * LIMIT;
    const slice = filtered.slice(start, start + LIMIT);
    const now   = Date.now();

    slice.forEach((m, i) => {
      const a = document.createElement("a");
      a.className = "card";
      a.href      = m.player_url;
      a.target    = "_blank";
      a.rel       = "noopener noreferrer";
      a.style.animationDelay = Math.min(i * 25, 500) + "ms";

      // Quality badge class
      let badgeClass = "badge-default";
      if (m.quality) {
        const q = m.quality.toUpperCase();
        if (q === "HD" || q === "1080P" || q === "720P") badgeClass = "badge-hd";
        else if (q.includes("CAM") || q === "TS") badgeClass = "badge-cam";
      }

      // Check if "new" (within 3 days if timestamp exists)
      let isNew = false;
      if (m.added_at) {
        isNew = (now - new Date(m.added_at).getTime()) < 3 * 24 * 60 * 60 * 1000;
      }

      a.innerHTML = `
        <div class="card-poster">
          ${m.poster
            ? `<img src="${m.poster}" alt="${escapeHtml(m.title)}" loading="lazy"
                onerror="this.parentElement.innerHTML='<div class=no-poster>🎬</div>'">`
            : '<div class="no-poster">🎬</div>'}
          ${isNew ? '<div class="new-badge">New</div>' : ''}
          ${m.quality ? `<div class="badge ${badgeClass}">${m.quality}</div>` : ''}
          ${m.rating  ? `<div class="rating-badge">★ ${m.rating}</div>` : ''}
          <div class="play-overlay">
            <div class="play-icon">▶</div>
          </div>
        </div>
        <div class="card-body">
          <div class="card-title">${escapeHtml(m.title)}</div>
          <div class="card-meta">
            ${m.year     ? `<span>${m.year}</span>` : ""}
            ${m.year && m.duration ? '<span class="card-meta-dot">·</span>' : ""}
            ${m.duration ? `<span>${m.duration}</span>` : ""}
            ${m.genre    ? `<span class="card-meta-dot">·</span><span>${m.genre}</span>` : ""}
          </div>
        </div>`;

      grid.appendChild(a);
    });

    // Append load-more spinner if more pages
    if (start + LIMIT < filtered.length) {
      const loader = document.createElement("div");
      loader.className = "load-more";
      loader.innerHTML = '<div class="spinner"></div>';
      grid.appendChild(loader);
    }

    page++;
    document.getElementById("stat-showing").textContent = Math.min(page * LIMIT - LIMIT + slice.length, filtered.length);
  }

  // ─── SEARCH ───
  let searchTimer;
  function filterMovies() {
    clearTimeout(searchTimer);
    const val = document.getElementById("search").value;
    document.getElementById("search-clear").classList.toggle("visible", val.length > 0);

    searchTimer = setTimeout(() => {
      currentSearch = val.toLowerCase().trim();
      filtered = currentSearch
        ? allMovies.filter(m => m.title.toLowerCase().includes(currentSearch))
        : allMovies;
      page = 1;
      renderPage(true);
      updateSectionLabel();
    }, 300);
  }

  function clearSearch() {
    document.getElementById("search").value = "";
    document.getElementById("search-clear").classList.remove("visible");
    currentSearch = "";
    filtered = allMovies;
    page = 1;
    renderPage(true);
    updateSectionLabel();
    document.getElementById("search").focus();
  }

  function updateSectionLabel() {
    const label = document.getElementById("section-label");
    label.textContent = currentSearch
      ? `Hasil pencarian: "${currentSearch}"`
      : "Semua Film";
  }

  // ─── HELPERS ───
  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // ─── INFINITE SCROLL ───
  window.addEventListener("scroll", () => {
    const scrolled = window.innerHeight + window.scrollY;
    const total    = document.body.offsetHeight;

    // Load more
    if (scrolled >= total - 500 && !loading) {
      if ((page - 1) * LIMIT < filtered.length) renderPage();
    }

    // Scroll-to-top button
    document.getElementById("scroll-top").classList.toggle("visible", window.scrollY > 600);
  });

  // ─── KEYBOARD SHORTCUT ───
  document.addEventListener("keydown", e => {
    // Ctrl/Cmd + K = focus search
    if ((e.ctrlKey || e.metaKey) && e.key === "k") {
      e.preventDefault();
      document.getElementById("search").focus();
      document.getElementById("search").select();
    }
    // Escape = clear search
    if (e.key === "Escape" && document.activeElement === document.getElementById("search")) {
      clearSearch();
    }
  });

  // ─── INIT ───
  checkAuth().then(ok => {
    if (ok) loadMovies();
  });

  // Auto-refresh every 30 min
  setInterval(() => loadMovies(true), 30 * 60 * 1000);
</script>
</body>
</html>
